name: 自动打包发布 Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 只构建生成 main.js
      - name: 安装依赖并构建
        run: |
          npm install
          npm run build

      # 查看所有文件（调试用）
      - name: 查看文件
        run: ls -al

      # ✅ 直接打包 3 个文件（2个已有 + 1个构建）
      - name: 打包发布文件
        run: zip release.zip main.js style.css manifest.json

      # 自动发布到 Release
      - name: 发布版本
        uses: softprops/action-gh-release@v2
        with:
          files: release.zip
          name: ${{ github.ref_name }}
          body: 自动构建发布 ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}