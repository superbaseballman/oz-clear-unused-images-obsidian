name: 自动打包发布 Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖并构建
        run: |
          npm install
          npm run build

      # 查看构建出来的文件（调试用，确保文件存在）
      - name: 查看文件列表
        run: ls -al

      # ✅ 一次性打包 3 个文件
      - name: 打包文件
        run: zip -r release.zip style.css manifest.json main.js

      # 自动发布到 GitHub Release
      - name: 发布版本
        uses: softprops/action-gh-release@v2
        with:
          files: release.zip
          name: ${{ github.ref_name }}
          body: 自动构建发布 ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}