name: 自动打包发布 Release

# 触发条件：打标签时自动执行
on:
  push:
    tags:
      - 'v*'  # 只要推送 v1.0 / v2.1.0 这种标签就会触发

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      # 前端项目（Vue/React/小程序等）
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖并构建
        run: |
          npm install
          npm run build

      - name: 打包构建结果
        run: zip -r release.zip dist/  # 把 dist 目录打包成 zip

      # ==============================================
      # 自动发布到 GitHub Release
      # ==============================================
      - name: 发布版本
        uses: softprops/action-gh-release@v2
        with:
          files: release.zip  # 上传的文件
          name: ${{ github.ref_name }}  # 版本标题
          body: 自动构建发布 ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}